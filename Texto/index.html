<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>carro</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        overflow: hidden;
        box-sizing: border-box;
    }
    div {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        background-color: rgb(255, 0, 0);
    }
    span {
        font-size: 10rem;
        color: white;
    }

    strong {
        color: yellow;
        animation: color 2s infinite ease-in;
    }

    @keyframes color {
        0% {color: blue;}
        50% {color: rgb(0, 255, 64);}
        100% {color: rgb(255, 0, 0);}
    }

</style>
<body>
    <div class="text">
        <span>Super<strong>INFOR</strong></span>
    </div>
</body>
</html>
